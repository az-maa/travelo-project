apiVersion: v1
kind: Service
metadata:
  name: travelo-db
  namespace: travelo
spec:
  selector:
    app: travelo-db
  ports:
    - port: 3306
      targetPort: 3306
  clusterIP: None
---
apiVersion: v1
kind: Service
metadata:
  name: travelo-backend
  namespace: travelo
spec:
  selector:
    app: travelo-backend
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: travelo-frontend
  namespace: travelo
spec:
  selector:
    app: travelo-frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP