apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: travelo-ingress
  namespace: travelo
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: travelo.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: travelo-frontend
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: travelo-backend
                port:
                  number: 8080