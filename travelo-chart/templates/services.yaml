apiVersion: v1
kind: Service
metadata:
  name: travelo-db
  namespace: travelo-helm
spec:
  selector:
    app: travelo-db
  ports:
    - port: 3306
      targetPort: 3306
  clusterIP: None
---
apiVersion: v1
kind: Service
metadata:
  name: travelo-backend
  namespace: travelo-helm
spec:
  selector:
    app: travelo-backend
  ports:
    - port: {{ .Values.backend.port }}
      targetPort: {{ .Values.backend.port }}
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: travelo-frontend
  namespace: travelo-helm
spec:
  selector:
    app: travelo-frontend
  ports:
    - port: {{ .Values.frontend.port }}
      targetPort: {{ .Values.frontend.port }}
  type: ClusterIP