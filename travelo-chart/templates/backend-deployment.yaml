apiVersion: apps/v1
kind: Deployment
metadata:
  name: travelo-backend
  namespace: travelo-helm
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: travelo-backend
  template:
    metadata:
      labels:
        app: travelo-backend
    spec:
      containers:
        - name: backend
          image: {{ .Values.backend.image }}:{{ .Values.backend.tag }}
          imagePullPolicy: Never
          ports:
            - containerPort: {{ .Values.backend.port }}
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: travelo-config
                  key: SPRING_DATASOURCE_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: travelo-config
                  key: SPRING_DATASOURCE_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: travelo-secret
                  key: mysql-password
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            tcpSocket:
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 45
            periodSeconds: 5
            failureThreshold: 3
          startupProbe:
            tcpSocket:
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10